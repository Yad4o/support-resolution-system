[pytest]
# pytest configuration for comprehensive testing

# Test discovery
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Output formatting
addopts = 
    -v
    --tb=short
    --strict-markers
    --disable-warnings
    --color=yes
    --durations=10

# Markers for test categorization
markers =
    unit: Unit tests for individual components
    integration: Integration tests for multiple components
    api: API endpoint tests
    ai: AI service tests
    mock: Tests using mocked services
    edge: Edge case and boundary condition tests
    performance: Performance and reliability tests
    slow: Tests that take longer to run
    database: Tests requiring database interaction

# Minimum Python version
minversion = 6.0

# Test coverage configuration (if pytest-cov is installed)
# addopts = --cov=app --cov-report=html --cov-report=term-missing

# Timeout configuration (if pytest-timeout is installed)
# timeout = 300
# timeout_method = thread

# Parallel execution (if pytest-xdist is installed)
# addopts = -n auto

# Logging configuration
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(name)s: %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# Warnings handling
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
    ignore::UserWarning:sqlalchemy.*

# Test ordering
# Use pytest-ordering if needed for specific test order requirements
